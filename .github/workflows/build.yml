name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [17, 21]
    name: Test with JDK ${{ matrix.java }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3

    - name: Make gradlew executable
      run: chmod +x iceberg-java/gradlew

    - name: Build with Gradle
      working-directory: iceberg-java
      run: ./gradlew build

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports-jdk${{ matrix.java }}
        path: iceberg-java/build/reports/tests/test/

  build-rust:
    runs-on: ubuntu-latest
    name: Build and Test Rust Examples

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        components: clippy

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          iceberg-rust/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('iceberg-rust/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build Rust examples
      working-directory: iceberg-rust
      run: cargo build

    - name: Run Rust tests
      working-directory: iceberg-rust
      run: cargo test

    - name: Run Clippy
      working-directory: iceberg-rust
      run: cargo clippy -- -D warnings
