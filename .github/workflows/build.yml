name: Bazel Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bazel-build:
    runs-on: ubuntu-latest
    name: Build with Bazel
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.15.0
      with:
        bazelisk-cache: true
        disk-cache: false
        repository-cache: true

    - name: Verify Bazel targets
      run: bazel query //...

    - name: Build all Bazel targets
      run: bazel build //...
