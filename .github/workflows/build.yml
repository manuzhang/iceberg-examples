name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    runs-on: ubuntu-latest
    name: Build and Test Java Examples (Bazel)
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Build Java examples
      run: bazel build //iceberg-java/...

    - name: Test Java examples
      run: bazel test //iceberg-java/...

  build-rust:
    runs-on: ubuntu-latest
    name: Build and Test Rust Examples (Bazel)
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Build Rust examples
      run: bazel build //iceberg-rust/...

    - name: Test Rust examples
      run: bazel test //iceberg-rust/...

  build-spark:
    runs-on: ubuntu-latest
    name: Build Spark Examples (Bazel)
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Bazel
      uses: bazel-contrib/setup-bazel@0.14.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ github.workflow }}
        repository-cache: true

    - name: Build Spark pipelines
      run: bazel build //iceberg-spark/...

  lint-spark:
    runs-on: ubuntu-latest
    name: Lint Spark Examples
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Ruff
      run: pip install ruff

    - name: Lint with Ruff
      working-directory: iceberg-spark
      run: ruff check .
