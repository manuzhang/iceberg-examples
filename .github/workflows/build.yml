name: Bazel Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bazel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - host_jdk: 17
            bazel_config: jdk17
          - host_jdk: 21
            bazel_config: jdk21
    name: Test with host JDK ${{ matrix.host_jdk }} and Bazel config ${{ matrix.bazel_config }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.host_jdk }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.host_jdk }}
          distribution: temurin

      - name: Install Bazelisk
        run: |
          curl -fsSL \
            https://github.com/bazelbuild/bazelisk/releases/download/v1.27.0/bazelisk-linux-amd64 \
            -o /usr/local/bin/bazel
          chmod +x /usr/local/bin/bazel

      - name: Show Bazel version
        run: bazel --version

      - name: Build all Bazel targets
        run: bazel build --config=${{ matrix.bazel_config }} //...

      - name: Run all Bazel tests
        run: bazel test --config=${{ matrix.bazel_config }} //...
